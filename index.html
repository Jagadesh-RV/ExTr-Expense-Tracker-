<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ExTR Login</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#08080d;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.login-box{
background:#12121c;
padding:40px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 0 25px rgba(0,255,255,0.2);
}

.login-box h2{
color:#00f7ff;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#1a1a25;
color:white;
}

.login-box button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#00f7ff;
cursor:pointer;
font-weight:bold;
}

.login-box button:hover{
box-shadow:0 0 15px #00f7ff;
}

</style>

</head>

<body>

<div class="login-box">

<h2>ExTR Login</h2>

<input id="username" placeholder="Enter your name">

<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let name=document.getElementById("username").value;

if(name===""){
alert("Please enter your name");
return;
}

/* Save username */

localStorage.setItem("extrUser",name);

/* Redirect */

window.location.href="dashboard.html";

}

</script>

</body>
</html>
